<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Media Adventure Page</title>
    <style>
        :root {
            --red: #e10600;
            --dark: #060816;
            --light: #f5f7fa;
            --gray: #cfd6e3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #050816 0%, #121a2e 50%, #220606 100%);
            color: var(--light);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(225, 6, 0, 0.25), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.12), transparent 25%);
            pointer-events: none;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 18px 60px;
        }

        .hero {
            background: linear-gradient(90deg, rgba(225, 6, 0, 0.95), rgba(8, 10, 20, 0.95));
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 24px 28px;
            text-align: center;
            box-shadow: 0 0 35px rgba(225, 6, 0, 0.25);
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
        }

        .hero p {
            margin: 0;
            color: var(--gray);
            font-size: 1.02rem;
        }

        .grid {
            display: grid;
            gap: 20px;
        }

        .card {
            background: rgba(8, 10, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
        }

        .card h2, .card h3 {
            color: var(--light);
            margin-top: 0;
        }

        figure {
            margin: 0;
        }

        img {
            display: block;
            width: 100%;
            max-width: 300px;
            height: auto;
            margin: 0 auto 10px;
            border-radius: 14px;
            border: 2px solid rgba(225, 6, 0, 0.45);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        figcaption {
            text-align: center;
            color: #ffd6d6;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            border-radius: 999px;
            background: white;
            color: var(--red);
            font-weight: 700;
        }

        audio {
            width: 100%;
            margin-top: 8px;
        }

        .video-wrap {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.22);
        }

        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 16px;
        }

        @media (max-width: 700px) {
            .hero h1 {
                font-size: 1.6rem;
            }

            .page {
                padding: 20px 12px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="hero">
            <h1>My F1 Media Adventure</h1>
            <p>Fast laps, bold colors, and iconic moments all in one page.</p>
        </header>

        <div class="grid">
            <section class="card">
                <h2>My Favorite Driver</h2>
                <figure>
                    <img src="Daniel riccardio.jpg" alt="Daniel Riccardio" width="300" height="400">
                    <figcaption>Daniel Riccardio</figcaption>
                </figure>
            </section>

            <section class="card">
                <h2>My Favorite Team</h2>
                <figure>
                    <img src="F1 teams.jpg" alt="All F1 Teams" width="300" height="500">
                    <figcaption>I honestly love all teams, but especially <b>MERCEDES</b></figcaption>
                    <span class="badge">Race day energy</span>
                </figure>
            </section>

            <section class="card">
                <h2>The Most Iconic Intro Track</h2>
                <audio controls loop>
                    <source src="tu-tu-tu-du-max-verstappen.mp3" type="audio/mpeg">
                </audio>
            </section>

            <section class="card">
                <h2>All F1 Intro with an Iconic Meme</h2>
                <div class="video-wrap">
                    <iframe
                        src="https://www.youtube.com/embed/X09funjh1jg?si=Ms13ao9yDm8kmzpW"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
